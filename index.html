<!DOCTYPE html>
<html lang="en"> 
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"/>
<title>Al-Quran — القرآن الكريم</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=Scheherazade+New:wght@400;500;700&family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
/* ═══════════════════════════════════════════════════════════════
   TOKENS
═══════════════════════════════════════════════════════════════ */
:root{
  --bg:#f7f2e8;
  --bg2:#ede6d6;
  --surface:#fff9f0;
  --card:#ffffff;
  --card2:#fffbf4;
  --border:#e8d9b8;
  --border2:#d4b87a;
  --text:#1a1206;
  --text2:#4a3b20;
  --text3:#8a7250;
  --text4:#b89a6a;
  --accent:#7c4a0c;
  --accent2:#c48a18;
  --gold:#d4a020;
  --gold2:#f0c848;
  --glow:rgba(212,160,32,.25);
  --arabic:#1a0e04;
  --green:#2d6a4f;
  --red:#c0392b;
  --ai-color:#4f46e5;
  --ai-bg:rgba(79,70,229,.06);
  --ai-border:rgba(79,70,229,.18);
  --shadow-sm:0 1px 4px rgba(60,30,0,.08);
  --shadow:0 4px 16px rgba(60,30,0,.12);
  --shadow-lg:0 8px 32px rgba(60,30,0,.16);
  --rad:14px;
  --rad-sm:8px;
  --rad-pill:999px;
  --transition:.2s cubic-bezier(.4,0,.2,1);
}
[data-dark]{
  --bg:#0b0804;
  --bg2:#111009;
  --surface:#16120a;
  --card:#1e1810;
  --card2:#241e14;
  --border:#2c2415;
  --border2:#4a3a1e;
  --text:#f2e8d4;
  --text2:#c8a870;
  --text3:#8a7248;
  --text4:#5a4a2a;
  --accent:#e0a830;
  --accent2:#f4c040;
  --gold:#e8b830;
  --gold2:#fcd860;
  --glow:rgba(232,184,48,.2);
  --arabic:#f8eed8;
  --ai-color:#818cf8;
  --ai-bg:rgba(129,140,248,.1);
  --ai-border:rgba(129,140,248,.25);
  --shadow-sm:0 1px 4px rgba(0,0,0,.3);
  --shadow:0 4px 16px rgba(0,0,0,.4);
  --shadow-lg:0 8px 32px rgba(0,0,0,.5);
}

/* ═══════════════════════════════════════════════════════════════
   RESET & BASE 
═══════════════════════════════════════════════════════════════ */
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{height:100%; overflow:hidden; font-size:15px;}
body{
  font-family:'DM Sans',system-ui,sans-serif;
  background:var(--bg);color:var(--text);
  height:100%; height:100dvh; overflow:hidden;
  line-height:1.6;
}
button{font-family:inherit;cursor:pointer}
input,select{font-family:inherit}
mark{background:var(--glow);color:var(--accent);font-weight:600;padding:0 2px;border-radius:3px}

::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:99px}
::-webkit-scrollbar-thumb:hover{background:var(--accent)}
*{scrollbar-width:thin;scrollbar-color:var(--border2) transparent}

/* ═══════════════════════════════════════════════════════════════
   LAYOUT
═══════════════════════════════════════════════════════════════ */
#app{
  max-width:520px; margin:0 auto; height:100%;
  display:flex; flex-direction:column;
  background:var(--bg); box-shadow:0 0 60px rgba(0,0,0,.08); position:relative;
}

#prog{ position:absolute;top:0;left:0;right:0;height:2.5px;z-index:999;background:transparent;pointer-events:none; }
#prog-fill{ height:100%;width:0;background:linear-gradient(90deg,var(--accent) 0%,var(--gold) 60%,var(--accent2) 100%);border-radius:0 2px 2px 0;transition:width .1s linear;box-shadow:0 0 8px var(--glow); }

/* ═══════════════════════════════════════════════════════════════
   HEADER & BOTTOM NAV
═══════════════════════════════════════════════════════════════ */
#hdr{
  background:var(--surface); border-bottom:1px solid var(--border);
  padding:0 14px; height:54px; display:flex; align-items:center; gap:8px;
  position:sticky; top:0; z-index:100; box-shadow:var(--shadow-sm);
  backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px);
}
.hdr-btn{
  width:36px; height:36px; border-radius:50%; background:none; border:none;
  color:var(--text3); display:flex; align-items:center; justify-content:center;
  transition:all var(--transition); flex-shrink:0;
}
.hdr-btn:hover{ background:var(--bg2); color:var(--accent); }
.hdr-btn svg { width:20px; height:20px; stroke-width:2; }
#back-btn{ display:none; color:var(--accent); }
#back-btn.show{ display:flex; }
#hdr-title{
  font-family:'Cinzel',serif; font-size:14.5px; font-weight:600;
  color:var(--accent); letter-spacing:.6px; flex:1; text-align:center;
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
}
#hdr-right{ display:flex; align-items:center; gap:2px; }

#content{
  flex:1; overflow-y:auto; overflow-x:hidden;
  padding-bottom:80px; -webkit-overflow-scrolling:touch; scroll-behavior:smooth;
}

#bnav{
  position:absolute;bottom:0;left:0;right:0;
  background:var(--surface); border-top:1px solid var(--border);
  display:flex; z-index:100; padding-bottom:env(safe-area-inset-bottom);
  box-shadow:0 -2px 16px rgba(0,0,0,.08);
}
.nb{
  flex:1; padding:8px 0 6px; background:none; border:none;
  color:var(--text4); font-size:8.5px; display:flex; flex-direction:column; align-items:center; gap:4px;
  font-family:'DM Sans',sans-serif; font-weight:500; letter-spacing:.1px;
  transition:color var(--transition); position:relative;
}
.nb .ic { display:flex; align-items:center; justify-content:center; transition:transform .2s; height:20px; }
.nb .ic svg { width:20px; height:20px; stroke-width:2; fill:none; stroke:currentColor; stroke-linecap:round; stroke-linejoin:round; }
.nb:hover .ic{ transform:translateY(-2px); }
.nb.on{ color:var(--accent); }
.nb.on::after{
  content:''; position:absolute; top:0; left:50%; transform:translateX(-50%);
  width:20px; height:2px; border-radius:0 0 2px 2px; background:var(--accent);
}

/* ═══════════════════════════════════════════════════════════════
   HOME HERO & SEARCH
═══════════════════════════════════════════════════════════════ */
#hero{
  background:linear-gradient(165deg,var(--bg2) 0%,var(--surface) 55%,var(--bg) 100%);
  padding:28px 20px 22px; text-align:center; border-bottom:1px solid var(--border);
  position:relative; overflow:hidden;
}
#hero::before{
  content:''; position:absolute; inset:0;
  background:radial-gradient(ellipse 80% 60% at 50% 0%,var(--glow),transparent); pointer-events:none;
}
.hero-bism{
  font-family:'Scheherazade New',serif; font-size:30px; color:var(--accent);
  direction:rtl; margin-bottom:6px; text-shadow:0 1px 8px var(--glow); line-height:1.6;
}
.hero-sub{ font-size:11px; color:var(--text3); letter-spacing:.8px; font-style:italic; }
.hero-stats{ display:flex; justify-content:center; gap:20px; margin-top:16px; padding-top:14px; border-top:1px solid var(--border); }
.hero-stat{text-align:center}
.hero-stat-n{font-family:'Cinzel',serif;font-size:18px;font-weight:700;color:var(--accent)}
.hero-stat-l{font-size:10px;color:var(--text3);letter-spacing:.5px;text-transform:uppercase;margin-top:1px}

.search-wrap{padding:14px 16px 10px;position:relative}
.search-ico{
  position:absolute;left:28px;top:36px;transform:translateY(-50%);
  color:var(--text4); display:flex; align-items:center; pointer-events:none;
}
.search-ico svg { width:16px; height:16px; stroke-width:2.5; stroke:currentColor; fill:none; }
.search-input{
  width:100%;padding:11px 14px 11px 40px;
  background:var(--card); border:1.5px solid var(--border); border-radius:var(--rad-pill);
  color:var(--text);font-size:14px;outline:none;
  transition:border-color var(--transition),box-shadow var(--transition);
  box-shadow:var(--shadow-sm);
}
.search-input.no-icon { padding-left:14px; }
.search-input::placeholder{color:var(--text4)}
.search-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--glow)}
.search-filters { gap:6px; margin-top:10px; animation: slideDown 0.2s ease-out; }
.filter-btn { 
  flex:1; padding:6px 0; border-radius:var(--rad-sm); background:var(--bg2); border:1px solid var(--border); 
  color:var(--text3); font-size:11px; font-weight:600; letter-spacing:.5px; text-transform:uppercase; transition:all var(--transition);
}
.filter-btn.active { background:var(--accent); color:#fff; border-color:var(--accent); box-shadow:0 2px 8px var(--glow); }

@keyframes slideDown { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }

/* ═══════════════════════════════════════════════════════════════
   LIST CARDS
═══════════════════════════════════════════════════════════════ */
.list-wrap{padding:0 16px 8px}
.surah-card{
  background:var(--card); border:1px solid var(--border); border-radius:var(--rad);
  padding:13px 14px; margin-bottom:9px; display:flex; align-items:center; gap:13px;
  cursor:pointer; box-shadow:var(--shadow-sm); transition:all var(--transition);
  animation:slideUp .3s ease both;
}
.surah-card:hover{ border-color:var(--border2); box-shadow:var(--shadow); transform:translateY(-1px); }
.surah-card:active{ transform:scale(.98); }
@keyframes slideUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}

.sn-badge{
  width:40px;height:40px;border-radius:10px;flex-shrink:0;
  background:linear-gradient(135deg,var(--bg2),var(--surface));
  border:1.5px solid var(--border2); display:flex;align-items:center;justify-content:center;
  font-family:'Cinzel',serif;font-size:12px;font-weight:700; color:var(--accent); box-shadow:inset 0 1px 0 rgba(255,255,255,.5);
}
.sn-badge svg { width:20px; height:20px; stroke:currentColor; fill:none; stroke-width:1.5; }
.sc-body{flex:1;min-width:0}
.sc-name{font-weight:600;font-size:14.5px;color:var(--text);letter-spacing:.1px}
.sc-meta{font-size:11.5px;color:var(--text3);margin-top:2px}
.sc-pill{ font-size:10px;color:var(--accent2); background:linear-gradient(135deg,var(--bg2),var(--surface)); border:1px solid var(--border2); border-radius:6px;padding:2px 7px; margin-top:5px;display:inline-block; }
.sc-ar{ font-family:'Scheherazade New',serif; font-size:21px; color:var(--accent2); direction:rtl; flex-shrink:0; text-shadow:0 1px 4px var(--glow); }

.verse-card { flex-direction: column; align-items: flex-start; gap: 6px; }
.vc-top { display: flex; justify-content: space-between; width: 100%; align-items: center; }
.vc-score { font-size: 10px; color: var(--text3); background: var(--bg2); padding: 2px 6px; border-radius: 4px; }
.vc-text { font-size: 13px; color: var(--text2); line-height: 1.6; white-space: normal; }

/* Juz specifics */
.juz-card{ background:var(--card);border:1px solid var(--border); border-radius:var(--rad); padding:14px;margin-bottom:9px; display:flex;align-items:center;gap:14px; cursor:pointer;box-shadow:var(--shadow-sm); transition:all var(--transition); animation:slideUp .3s ease both; }
.juz-card:hover{border-color:var(--border2);box-shadow:var(--shadow);transform:translateY(-1px)}
.juz-num{ width:44px;height:44px;border-radius:50%;flex-shrink:0; background:linear-gradient(135deg,var(--accent),var(--accent2)); display:flex;align-items:center;justify-content:center; font-family:'Cinzel',serif;font-size:14px;font-weight:700;color:#fff; box-shadow:0 3px 10px var(--glow); }
.juz-body{flex:1}
.juz-title{font-weight:600;font-size:15px;color:var(--text)}
.juz-range{font-size:11.5px;color:var(--text3);margin-top:2px}
.juz-surahs{ font-size:10.5px;color:var(--text4); margin-top:6px; display:flex;flex-wrap:wrap;gap:4px; }
.juz-tag{ background:var(--bg2);border:1px solid var(--border); border-radius:4px;padding:1px 6px;color:var(--text3); }

/* Hadith status pills */
.h-status { font-size: 10px; font-weight: 700; padding: 3px 8px; border-radius: var(--rad-pill); letter-spacing:0.5px; text-transform:uppercase; margin-left: auto; }
.h-status.sahih { color: #1e4620; background: #cce8d6; border: 1px solid #99d1ab; }
.h-status.hasan { color: #7c4a0c; background: #faedcd; border: 1px solid #f2d184; }
.h-status.daeef, .h-status.da\'eef { color: #7a1e1e; background: #fad4d4; border: 1px solid #f29b9b; }
[data-dark] .h-status.sahih { color: #a3e6b9; background: rgba(45,106,79,.3); border-color: #2d6a4f; }
[data-dark] .h-status.hasan { color: #f4c040; background: rgba(196,138,24,.3); border-color: #a87212; }
[data-dark] .h-status.daeef, [data-dark] .h-status.da\'eef { color: #f29b9b; background: rgba(192,57,43,.3); border-color: #94291d; }
.h-narrator { font-size:12.5px; color:var(--text3); font-weight:600; margin-bottom:6px; }

/* ═══════════════════════════════════════════════════════════════
   READER STYLES (AYAH / HADITH CARDS)
═══════════════════════════════════════════════════════════════ */
#rdr-hdr{
  background:linear-gradient(160deg,var(--bg2) 0%,var(--surface) 100%);
  border-bottom:1px solid var(--border); padding:22px 20px 16px;
  text-align:center; position:relative; overflow:hidden;
}
#rdr-hdr::before{ content:'';position:absolute;inset:0; background:radial-gradient(ellipse 70% 50% at 50% 0%,var(--glow),transparent); pointer-events:none; }
.rdr-label{ font-family:'DM Sans',sans-serif;font-size:10px;font-weight:600; color:var(--text4);letter-spacing:2px;text-transform:uppercase;margin-bottom:6px; }
.rdr-arabic{ font-family:'Scheherazade New',serif;font-size:28px; color:var(--accent); direction:rtl; text-shadow:0 2px 10px var(--glow); margin-bottom:4px;line-height:1.5; }
.rdr-name{font-family:'DM Serif Display',serif;font-size:22px;color:var(--text);font-weight:400; margin-bottom:2px}
.rdr-meta{font-size:12px;color:var(--text3);margin-top:3px; padding:0 10px;}
.rdr-pills{display:flex;justify-content:center;flex-wrap:wrap;gap:6px;margin-top:8px}
.rdr-pill{ font-size:10px;background:var(--bg2);border:1px solid var(--border2); border-radius:var(--rad-pill);padding:3px 10px;color:var(--accent); font-weight:500; }
.rdr-actions{display:flex;justify-content:center;gap:8px;margin-top:14px;flex-wrap:wrap}

.bism-divider{ text-align:center; font-family:'Scheherazade New',serif; font-size:22px;color:var(--accent); padding:14px 20px 6px; direction:rtl; line-height:1.8; }

.alist{padding:10px 16px}
.ac{
  background:var(--card); border:1px solid var(--border); border-radius:var(--rad);
  margin-bottom:12px; overflow:hidden; box-shadow:var(--shadow-sm);
  transition:all 0.3s ease; animation:slideUp .25s ease both;
}
.ac:hover{border-color:var(--border2)}
.ac.playing{ 
  border-color:var(--accent); box-shadow:0 0 0 2px var(--accent), 0 8px 24px rgba(60,30,0,.12); 
  transform:scale(1.02); z-index:10; position:relative; background: linear-gradient(145deg, var(--card), var(--surface));
}
[data-dark] .ac.playing { box-shadow:0 0 0 2px var(--accent), 0 8px 24px rgba(0,0,0,.4); }

@keyframes targetPulse { 0%, 100% { box-shadow: var(--shadow-sm); border-color: var(--border); transform:scale(1); } 50% { box-shadow: 0 0 0 3px var(--accent), 0 8px 24px var(--glow); border-color: var(--accent); transform:scale(1.02); } }
.ac.target-ayah { animation: targetPulse 2s ease-out; }

.ac-top{ display:flex;align-items:center;justify-content:space-between; padding:10px 12px 0; }
.ayah-num{ width:30px;height:30px;border-radius:8px; background:linear-gradient(135deg,var(--bg2),var(--surface)); border:1px solid var(--border2); display:flex;align-items:center;justify-content:center; font-family:'Cinzel',serif;font-size:11px;font-weight:700;color:var(--accent); }
.ayah-actions{display:flex;gap:8px;align-items:center; margin-left:auto;}
.ayah-actions button { width:32px;height:32px;border-radius:50%; background:var(--bg2);border:1.5px solid var(--border2); display:flex;align-items:center;justify-content:center; transition:all var(--transition); }
.ayah-actions button svg { width:14px; height:14px; stroke:currentColor; stroke-width:2; fill:none; stroke-linecap:round; stroke-linejoin:round; }
.play-ayah{ color:var(--accent); }
.play-ayah svg { fill:currentColor; stroke:none; }
.play-ayah:hover,.play-ayah.playing{ background:var(--accent);color:#fff;border-color:var(--accent); box-shadow:0 3px 10px var(--glow); }
.bk-ayah{ color:var(--text4); }
.bk-ayah:hover{border-color:var(--accent2);color:var(--accent2)}
.bk-ayah.saved{background:var(--accent2);border-color:var(--accent2);color:#fff}
.bk-ayah.saved svg { fill:currentColor; }

/* AI Feature Styles */
.ai-btn { color:var(--text4); }
.ai-btn:hover { background:var(--ai-color) !important; color:#fff !important; border-color:var(--ai-color) !important; box-shadow:0 3px 10px var(--ai-bg); }
.ai-btn.active { background:var(--ai-color); color:#fff; border-color:var(--ai-color); }
.ai-btn svg { stroke-width: 1.5; }

.ai-box { margin:6px 12px 14px; padding:16px; background:var(--ai-bg); border:1px solid var(--ai-border); border-radius:12px; font-size:13.5px; color:var(--text); animation:slideDown .25s ease; }
.ai-title { font-weight:700; color:var(--ai-color); margin-bottom:12px; display:flex; align-items:center; gap:6px; font-size:12px; text-transform:uppercase; letter-spacing:1px; border-bottom: 1px solid var(--ai-border); padding-bottom: 10px; }
.ai-title svg { width:15px; height:15px; }
.ai-loading { color:var(--text3); font-style:italic; display:flex; align-items:center; gap:8px; font-size:13px; }
.ai-error { color:var(--red); font-size:13px; }

/* AI Markdown Formatting */
.ai-content { line-height: 1.7; }
.ai-content strong { color: var(--ai-color); font-weight: 700; }
.ai-content em { color: var(--text2); }
.ai-content br { content: ""; display: block; margin-bottom: 8px; }

.ac-arabic{ font-family:'Scheherazade New',serif; direction:rtl;text-align:right; line-height:2.2;color:var(--arabic); padding:12px 14px 8px; border-bottom:1px solid var(--border); }
.ac-translation{ padding:10px 14px; font-size:13.5px;color:var(--text2); line-height:1.8; }
.ac-bengali{ padding:0 14px 10px; font-size:12.5px;color:var(--text3); line-height:1.75;font-style:italic; border-top:1px dashed var(--border); padding-top:8px;margin-top:0; }

.juz-section-hdr{ margin:4px 16px 0; background:linear-gradient(135deg,var(--bg2),var(--surface)); border:1px solid var(--border2); border-radius:var(--rad); padding:12px 14px; display:flex;align-items:center;gap:12px; }
.juz-section-badge{ width:38px;height:38px;border-radius:9px; background:linear-gradient(135deg,var(--accent),var(--accent2)); display:flex;align-items:center;justify-content:center; font-family:'Cinzel',serif;font-size:11px;font-weight:700;color:#fff; flex-shrink:0; }
.juz-section-info{flex:1}
.juz-section-name{font-weight:600;font-size:14px;color:var(--text)}
.juz-section-sub{font-size:11px;color:var(--text3);margin-top:1px}
.juz-section-ar{font-family:'Scheherazade New',serif;font-size:20px;color:var(--accent2)}

/* ═══════════════════════════════════════════════════════════════
   AUDIO & GLOBALS
═══════════════════════════════════════════════════════════════ */
#audio-player{ display:none; position:absolute;bottom:68px; left:12px;right:12px; background:var(--surface); border:1.5px solid var(--border2); border-radius:var(--rad); padding:12px 14px; box-shadow:var(--shadow-lg); z-index:99; animation:slideUp .25s ease; }
#audio-player.on{display:block}
.ap-top{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.ap-icon{ width:36px;height:36px;border-radius:9px;flex-shrink:0; background:linear-gradient(135deg,var(--accent),var(--accent2)); display:flex;align-items:center;justify-content:center; color:#fff; box-shadow:0 3px 10px var(--glow); }
.ap-icon svg { width:20px; height:20px; stroke-width:2.5; stroke:currentColor; fill:none; stroke-linecap:round; stroke-linejoin:round; }
.ap-info{flex:1;min-width:0}
.ap-title{font-weight:600;font-size:13px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ap-sub{font-size:11px;color:var(--text3);margin-top:1px}
.ap-btn{ width:34px;height:34px;border-radius:50%; background:var(--bg2);border:1.5px solid var(--border); color:var(--accent); display:flex;align-items:center;justify-content:center; transition:all var(--transition); }
.ap-btn svg { width:16px; height:16px; fill:currentColor; }
.ap-btn:hover{background:var(--accent);color:#fff;border-color:var(--accent);box-shadow:0 3px 10px var(--glow)}
.ap-stop{background:var(--accent);color:#fff;border-color:var(--accent)}
.ap-track{ height:4px;background:var(--border);border-radius:2px; overflow:hidden;margin-top:2px; }

// ══════════════════════════════════════════════════════════════
// INDEXED_DB WRAPPER FOR PERSISTENT CACHING
// ══════════════════════════════════════════════════════════════
const DB_NAME = 'quran_db';
const STORE_NAME = 'cache';

function initDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, 1);
    req.onupgradeneeded = e => {
      const db = e.target.result;
      if (!db.objectStoreNames.contains(STORE_NAME)) db.createObjectStore(STORE_NAME);
    };
    req.onsuccess = e => resolve(e.target.result);
    req.onerror = e => reject(e);
  });
}

async function idbGet(key) {
  try {
    const db = await initDB();
    return new Promise((resolve) => {
      const tx = db.transaction(STORE_NAME, 'readonly');
      const req = tx.objectStore(STORE_NAME).get(key);
      req.onsuccess = () => resolve(req.result);
      req.onerror = () => resolve(null);
    });
  } catch (e) { return null; }
}

async function idbSet(key, val) {
  try {
    const db = await initDB();
    return new Promise((resolve) => {
      const tx = db.transaction(STORE_NAME, 'readwrite');
      tx.objectStore(STORE_NAME).put(val, key);
      tx.oncomplete = () => resolve();
      tx.onerror = () => resolve();
    });
  } catch (e) {}
}

async function fetchWithRetry(url, retries = 3) {
  for (let i = 0; i < retries; i++) {
    try {
      const r = await fetch(url, { cache: 'default' });
      if (!r.ok) throw new Error(`HTTP ${r.status}`);
      return await r.json();
    } catch (e) {
      if (i === retries - 1) throw e;
      await new Promise(resolve => setTimeout(resolve, 1000 * (i + 1))); // Exponential backoff
    }
  }
}

let searchTimer;
function debounceUnifiedSearch(q) { clearTimeout(searchTimer); searchTimer = setTimeout(() => runUnifiedSearch(q.trim()), 400); }
function tokenize(text) { return text.toLowerCase().match(/\w+/g) || []; }
function getTrigrams(str) {
  const grams = new Map();
  if (str.length < 3) return grams;
  for (let i = 0; i <= str.length - 3; i++) { const g = str.substring(i, i + 3); grams.set(g, (grams.get(g) || 0) + 1); }
  return grams;
}
function scoreVerse(qWords, qTrigrams, qRaw, v) {
  let score = 0;
  if (v.tLow.includes(qRaw)) score += 500;
  let wordsFound = 0;
  for (const qw of qWords) { if (v.words.includes(qw)) { score += 50; wordsFound++; } else if (v.tLow.includes(qw)) { score += 15; } }
  if (wordsFound > 0 && wordsFound === qWords.length) score += 200;
  if (qTrigrams.size > 0) {
    let dotProduct = 0;
    for (const [g, count1] of qTrigrams.entries()) { if (v.trigrams.has(g)) dotProduct += count1 * v.trigrams.get(g); }
    score += (dotProduct * 5);
  }
  return score;
}

async function fetchFullQuran() {
  if (S.globalQuran) return;
  const cachedFullQuran = await idbGet('full_quran_search');
  if (cachedFullQuran) { S.globalQuran = cachedFullQuran; return; }

  try {
    const data = await fetchWithRetry('https://api.alquran.cloud/v1/quran/en.sahih', 3);
    const arr = [];
    if (data && data.data && Array.isArray(data.data.surahs)) {
      data.data.surahs.forEach(sur => { (sur.ayahs || []).forEach(ay => { arr.push({ s: sur.number, a: ay.numberInSurah, text: ay.text }); }); });
      S.globalQuran = arr.map(v => {
        const text = v.text || '', tLow = text.toLowerCase();
        return { s: v.s, a: v.a, t: text, tLow: tLow, words: tLow.match(/\w+/g) || [], trigrams: getTrigrams(tLow) };
      });
      await idbSet('full_quran_search', S.globalQuran);
    }
  } catch(e) {}
}

function highlightText(text, words) {
  if(!words || !words.length) return text;
  const safeWords = words.map(w => w.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')).filter(w => w.length > 2);
  if(!safeWords.length) return text;
  return text.replace(new RegExp(`\\b(${safeWords.join('|')})`, 'gi'), '<mark>$1</mark>');
}

async function runUnifiedSearch(q) {
  const content = $('home-content'); const filters = $('search-filters');
  if(!q) {
    if(filters) filters.style.display = 'none';
    content.innerHTML = `<div class="section-title">ALL SURAHS</div><div class="list-wrap">${surahCards(SURAHS)}</div>`;
    return;
  }
  
  if(filters) filters.style.display = 'flex';
  content.innerHTML = `<div class="loader"><div class="loader-dots"><div class="loader-dot"></div><div class="loader-dot"></div><div class="loader-dot"></div></div><div class="loader-msg">Searching...</div></div>`;
  let out = '';
  
  if (S.searchFilter === 'all' || S.searchFilter === 'quran') {
    const fSurahs = SURAHS.filter(s=>s.name.toLowerCase().includes(q.toLowerCase())||s.ar.includes(q)||s.tr.toLowerCase().includes(q.toLowerCase())||String(s.n)===q);
    if(fSurahs.length) out += `<div class="section-title">SURAH MATCHES</div><div class="list-wrap">${surahCards(fSurahs)}</div>`;
  }

  if(q.length >= 3) {
    if (S.searchFilter === 'all' || S.searchFilter === 'quran') {
      if(!S.globalQuran) await fetchFullQuran();
      if(S.globalQuran) {
        const qWords = tokenize(q), qRaw = q.toLowerCase(), qTrigrams = getTrigrams(qRaw), qResults = [];
        for(const v of S.globalQuran) { let score = scoreVerse(qWords, qTrigrams, qRaw, v); if(score > 25) qResults.push({...v, score}); }
        if(qResults.length) {
          qResults.sort((a,b)=>b.score - a.score);
          out += `<div class="section-title" style="margin-top:10px">QURAN MATCHES</div><div class="list-wrap">`;
          out += qResults.slice(0, 20).map(r => `
            <div class="surah-card verse-card" onclick="loadSurahAndScroll(${r.s}, ${r.a})">
              <div class="vc-top"><div class="vc-name">${SURAHS[r.s-1].name} • Ayah ${r.a}</div></div>
              <div class="vc-text">${highlightText(r.t, qWords)}</div>
            </div>`).join('');
          out += `</div>`;
        }
      }
    }

    if (S.searchFilter === 'all' || S.searchFilter === 'hadith') {
      try {
        const hData = await fetchWithRetry(`https://hadithapi.com/public/api/hadiths?apiKey=${HADITH_KEY}&hadithEnglish=${encodeURIComponent(q)}&paginate=15`, 2);
        const hits = hData.hadiths?.data || hData.data || [];
        if(hData.status === 200 && hits.length) {
          const qWords = tokenize(q);
          out += `<div class="section-title" style="margin-top:10px">HADITH MATCHES</div><div class="list-wrap">`;
          out += hits.map(h => `
            <div class="surah-card verse-card" onclick="loadHadithsAndScroll('${h.bookSlug}', '${h.chapterId}', '${h.hadithNumber}', '${h.book?.bookName || 'Hadith'}')">
              <div class="vc-top">
                <div class="vc-name">${h.book?.bookName || 'Hadith'} • Ch ${h.chapterId || '-'}</div>
                <div class="vc-score">${h.status || ''}</div>
              </div>
              <div class="vc-text">${highlightText(h.hadithEnglish || '', qWords)}</div>
            </div>`).join('');
          out += `</div>`;
        }
      } catch(e) {}
    }
  }

  if(!out) out = `<div class="empty-state"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg><div class="e-title">No matches found</div><div class="e-sub">Try searching with different keywords</div></div>`;
  content.innerHTML = out;
}

async function loadSurahAndScroll(surahNo, ayahNo) {

async function loadHadithsAndScroll(slug, chapNo, hadithNo, bookName) {
  goTab('hadith'); S.hBookSlug = slug; S.hBookName = bookName;

    if (el) { el.scrollIntoView({ behavior: 'smooth', block: 'center' }); el.classList.add('target-ayah'); setTimeout(() => el.classList.remove('target-ayah'), 2500); }
  }, 400);
}

async function fetchHBooks(){
  const cached = await idbGet('h_books'); if(cached) return cached;
  const d = await fetchWithRetry(`${HADITH_API}/books?apiKey=${HADITH_KEY}`, 3);
  if(d.status !== 200) throw new Error(d.message || 'API Error');
  const books = d.books || d.data || [];
  await idbSet('h_books', books); return books;
}

async function fetchHChapters(slug){
  const cached = await idbGet(`h_chaps_${slug}`); if(cached) return cached;
  const d = await fetchWithRetry(`${HADITH_API}/${slug}/chapters?apiKey=${HADITH_KEY}`, 3);
  if(d.status !== 200) throw new Error(d.message || 'API Error');
  const chaps = d.chapters?.data || d.chapters || d.data || [];
  await idbSet(`h_chaps_${slug}`, chaps); return chaps;
}

async function fetchHadiths(slug, chapNo, page=1){
  const cacheKey = `hadith_${slug}_${chapNo}_p${page}`;
  const cached = await idbGet(cacheKey); if(cached) return cached;
  const d = await fetchWithRetry(`${HADITH_API}/hadiths?apiKey=${HADITH_KEY}&book=${slug}&chapter=${chapNo}&paginate=50&page=${page}`, 3);
  if(d.status !== 200) throw new Error(d.message || 'API Error');
  await idbSet(cacheKey, d); return d;
}

function formatMarkdown(text) {
  return text
    .replace(/^### (.*$)/gim, '<div style="font-weight:700; color:var(--text); margin-top:10px">$1</div>')
    .replace(/^## (.*$)/gim, '<div style="font-weight:700; color:var(--text); margin-top:10px">$1</div>')
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.*?)\*/g, '<em>$1</em>')
    .replace(/\n\n/g, '<div style="height:12px"></div>')
    .replace(/\n- (.*?)/g, '<br>• $1')
    .replace(/\n\* (.*?)/g, '<br>• $1')
    .replace(/\n/g, '<br>');
}

async function fetchAIExplanation(prompt, title) {
  const systemPrompt = `You are a knowledgeable and authentic Islamic scholar grounded in Qur’an and Sunnah. Provide a concise, accurate, and respectful explanation (Tafsir/Sharh) of the given ${title}.

Keep the explanation strictly within 1–2 short sentences. Clearly emphasize the core message or lesson without unnecessary detail. Avoid speculation and ensure theological correctness.

Format your response using Markdown (e.g., use **bold** for key terms, concepts, or names) to make it easy to read.

Respond ONLY in ${S.aiLang}.`;

  const res = await fetch(`https://gen.pollinations.ai/v1/chat/completions`, {
    method: "POST", 
    headers: { 
      "Content-Type": "application/json",
      "Authorization": "Bearer pk_nlv1dNVAlxDthCOe" 
    },
    body: JSON.stringify({ 
      model: S.aiModel,
      messages: [
        { role: "system", content: systemPrompt },
        { role: "user", content: prompt }
      ] 
    })
  });
  if (!res.ok) throw new Error("API_ERROR");
  const data = await res.json();
  return data.choices[0].message.content;
}

async function handleAIToggle(boxId, btnId, title, getPromptText) {
  const box = $(boxId), btn = $(btnId);
  if(box.style.display === 'block') { box.style.display = 'none'; btn.classList.remove('active'); return; }
  
  box.style.display = 'block'; btn.classList.add('active');
  if(box.innerHTML.includes('ai-content')) return; 
  
  box.innerHTML = `<div class="ai-loading"><svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" class="spin"><path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/></svg> Analyzing and explaining...</div>`;
  
  try {
    const text = getPromptText();
    const prompt = `Please explain the following ${title}:\n\n"${text}"`;
    const expl = await fetchAIExplanation(prompt, title);
    const formattedExpl = formatMarkdown(expl);
    
    box.innerHTML = `
      <div class="ai-title">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9.9 15.5a2 2 0 0 0-1.4 1.4l-1.5 6.1a.5.5 0 0 1-1 0l-1.5-6.1a2 2 0 0 0-1.4-1.4l-6.1-1.5a.5.5 0 0 1 0-1l6.1-1.5a2 2 0 0 0 1.4-1.4l1.5-6.1a.5.5 0 0 1 1 0l1.5 6.1a2 2 0 0 0 1.4 1.4l6.1 1.5a.5.5 0 0 1 0 1z"/><path d="M20 3v4M22 5h-4M4 17v2M5 18H3"/></svg> 
        AI Explanation (${S.aiModel})
      </div>
      <div class="ai-content">${formattedExpl}</div>`;
  } catch(e) {
    box.innerHTML = `<div class="ai-error">Error: Failed to fetch response. Please try again or check your connection.</div>`;
  }
}

function formatTime12(time24) {
  let [h, m] = time24.split(' ')[0].split(':').map(Number);
  let ampm = h >= 12 ? 'PM' : 'AM'; h = h % 12 || 12;
  return `${h}:${m.toString().padStart(2, '0')} ${ampm}`;
}

async function renderPrayers() {
  showLoader('Loading Timings...');
  const d = new Date(); const cty = S.prayers.city || 'Dhaka'; const ctry = S.prayers.country || 'Bangladesh';
  
  try {
    const url = `https://api.aladhan.com/v1/timingsByCity?city=${encodeURIComponent(cty)}&country=${encodeURIComponent(ctry)}&method=${S.prayers.method}`;
    const data = await fetchWithRetry(url, 2);
    const timings = data.data?.timings || {};

    const currentMins = d.getHours() * 60 + d.getMinutes();
    let nextName = ''; const ordered = ['Fajr', 'Sunrise', 'Dhuhr', 'Asr', 'Maghrib', 'Isha'];
    for (const p of ordered) {
      if(!timings[p]) continue;
      let [h, m] = timings[p].split(' ')[0].split(':').map(Number);
      if ((h * 60 + m) > currentMins) { nextName = p; break; }

      'Fajr': `<svg viewBox="0 0 24 24"><path d="M12 2v8M4.93 10.93l1.41 1.41M2 18h20M20 20H4M19.07 10.93l-1.41 1.41M12 10a4 4 0 0 0-4 4h8a4 4 0 0 0-4-4z"/></svg>`,

      'Isha': `<svg viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>`

function toggleBk(sn,an,sname){
  const key=`q-${sn}-${an}`,ex=S.bookmarks.find(b=>b.key===key);
  ex?S.bookmarks=S.bookmarks.filter(b=>b.key!==key):S.bookmarks.push({key, type:'quran', sn, an, sname}); saveBk();
  const btn=$(`bk-${sn}-${an}`); if(btn){btn.classList.toggle('saved',!ex);btn.title=ex?'Bookmark':'Saved';}
}
function isBk(sn,an){return S.bookmarks.some(b=>b.key===`q-${sn}-${an}`)}

function toggleHBk(bookSlug, chapNo, hadithNo, bookName) {
  const key = `h-${bookSlug}-${hadithNo}`; const ex = S.bookmarks.find(b => b.key === key);
  if(ex) S.bookmarks = S.bookmarks.filter(b => b.key !== key); else S.bookmarks.push({ key, type: 'hadith', bookSlug, chapNo, hadithNo, bookName }); saveBk();
  const btn = $(`bk-h-${hadithNo}`); if(btn) { btn.classList.toggle('saved', !ex); btn.title = ex ? 'Bookmark' : 'Saved'; }
}
function isHBk(bookSlug, hadithNo) { return S.bookmarks.some(b => b.key === `h-${bookSlug}-${hadithNo}`); }

// ══════════════════════════════════════════════════════════════
// QURAN DATA FETCHING WITH CACHE & RETRY
// ══════════════════════════════════════════════════════════════
async function fromAlquran(no,edition){
  const d=await fetchWithRetry(`${AQ}/surah/${no}/${edition}`, 2);
  if(d.code!==200||!d.data?.ayahs)throw new Error('bad');
  return d.data.ayahs.map(a=>a.text);
}
async function fromJSD(no,edition){
  for(const url of[`${JSD}/${edition}/${no}.min.json`,`${JSD}/${edition}/${no}.json`]){
    try{
      const d=await fetchWithRetry(url, 1);
      const arr=d[edition]||d.chapter||d.verses||Object.values(d).find(v=>Array.isArray(v));
      if(arr?.length)return arr.map(v=>v.text||v.t||'');
    }catch{}
  }
  throw new Error(`JSD failed: ${edition}/${no}`);
}
async function fetchSurah(no){
  const cacheKey = `surah_${no}`;
  const cached = await idbGet(cacheKey); if (cached) return cached;
  const tryAr=()=>fromAlquran(no,'quran-uthmani').catch(()=>fromJSD(no,'quran-uthmani'));
  const tryEn=()=>fromAlquran(no,'en.ahmedali').catch(()=>fromAlquran(no,'en.sahih')).catch(()=>fromJSD(no,'eng-muhammadali'));
  const tryBn=()=>fromAlquran(no,'bn.bengali').catch(()=>fromJSD(no,'ben-muhiuddinkhan'));
  const [ar,en,bn]=await Promise.all([tryAr(),tryEn(),tryBn()]);
  const data = {ar,en,bn}; await idbSet(cacheKey, data); return data;
}

async function loadSurah(no){
  stopAudio();S.surahNo=no;S.juzMode=false;

  $('back-btn').classList.add('show');
  const sm=SURAHS[no-1]; $('hdr-title').textContent=sm.name;
  
  const isCached = await idbGet(`surah_${no}`);
  if (!isCached) showLoader(`Loading ${sm.name}…`);
  
  try{
    const d=await fetchSurah(no);
    S.arabic=d.ar;S.english=d.en;S.bengali=d.bn;S.surahData=true;
    renderReader();
  }catch(e){
    C.innerHTML=`<div class="error-card"><div class="e-head"><svg viewBox="0 0 24 24"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>Error loading ${sm.name}</div><div class="e-msg">${e.message}<br>Please check your internet connection.</div><div class="btn-row"><button class="btn btn-play" onclick="loadSurah(${no})">Retry</button><button class="btn" onclick="goBack()">Back</button></div></div>`;
  }
}

    </div>
  </div>`;
  if(sm.n!==1&&sm.n!==9) h+=`<div class="bism-divider">بِسْمِ ٱللَّهِ ٱلرَّحْمَٰنِ ٱلرَّحِيمِ</div>`;
  h+=`<div class="alist">`;
  (S.arabic||[]).forEach((ar,i)=>{ const an=i+1,bk=isBk(sm.n,an); h+=ayahCard(sm.n,an,i,ar,tr[i]||'',bn[i]||'',bk,''); });
  h+=`</div>`; C.innerHTML=h; resetScroll();
}

        <div class="ayah-num">${an}</div>
        <div class="ayah-actions">
          <button class="ai-btn" id="aiq-${sn}-${an}" onclick="explainAyah(${sn}, ${idx}, ${an})" title="AI Explain">

          </button>
          <button class="play-ayah" id="${pid}" onclick="${idPrefix?`toggleJuzAyahAudio(${sn},${idx})`:`toggleAyahAudio(${idx})`}" title="Play Ayah">
            <svg viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
          </button>
          <button class="bk-ayah${bk?' saved':''}" id="bk-${sn}-${an}" onclick="toggleBk(${sn},${an},'${SURAHS[sn-1].name}')" title="${bk?'Saved':'Bookmark'}">
            <svg viewBox="0 0 24 24"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"></path></svg>
          </button>
        </div>
      </div>
      <div class="ac-arabic" style="font-size:${S.fontSize}px">${ar}</div>
      ${translation?`<div class="ac-translation">${translation}</div>`:''}
      ${bengali?`<div class="ac-bengali">${bengali}</div>`:''}

// LOAD JUZ
// ══════════════════════════════════════════════════════════════
async function loadJuz(juzNo){
  stopAudio(); S.juzMode=true;S.currentJuz=juzNo;S.fromJuz=true;S.surahNo=null;S.surahData=false;
  document.querySelectorAll('.nb').forEach(b=>b.classList.remove('on')); $('back-btn').classList.add('show'); $('hdr-title').textContent=`Juz ${juzNo}`;
  const juz=JUZ[juzNo-1]; const nums=[];for(let s=juz.s;s<=juz.es;s++)nums.push(s);
  showLoader(`Loading Juz ${juzNo}… (${nums.length} Surahs)`);
  try{
    const results=await Promise.all(nums.map(n=>fetchSurah(n).then(d=>({n,...d}))));
    S.juzResults=results; renderJuzReader();
  }catch(e){
    C.innerHTML=`<div class="error-card"><div class="e-head"><svg viewBox="0 0 24 24"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>Error loading Juz ${juzNo}</div><div class="e-msg">${e.message}</div><div class="btn-row"><button class="btn btn-play" onclick="loadJuz(${juzNo})">Retry</button><button class="btn" onclick="goBack()">Back</button></div></div>`;
  }
}
function renderJuzReader(){
  const juz=JUZ[S.currentJuz-1];
  const totalAyahs=(S.juzResults||[]).reduce((a,r)=>{ const sm=SURAHS[r.n-1]; const start=(r.n===juz.s)?juz.a-1:0; const end=(r.n===juz.es)?juz.ea:sm.ay; return a+(end-start); },0);

  let h=`<div id="rdr-hdr"><div class="rdr-label">Para · Juz ${S.currentJuz} of 30</div><div class="rdr-name" style="font-size:20px">Juz ${S.currentJuz}</div><div class="rdr-pills"><span class="rdr-pill">${(S.juzResults||[]).length} Surahs</span><span class="rdr-pill">~${totalAyahs} Ayahs</span></div><div class="rdr-actions"><button class="btn${S.lang==='bengali'?' on':''}" onclick="cycleLangJuz()"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"></circle><line x1="2" y1="12" x2="22" y2="12"></line><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path></svg> ${S.lang==='english'?'বাংলা':'English'}</button></div></div>`;

  (S.juzResults||[]).forEach(({n,ar,en,bn})=>{
    const sm=SURAHS[n-1]; const start=(n===juz.s)?juz.a-1:0; const end=(n===juz.es)?juz.ea:sm.ay;
    const sliceAr=ar.slice(start,end); const sliceTr=(S.lang==='bengali'?bn:en).slice(start,end); const sliceBn=(S.lang!=='bengali'&&S.showBengali)?bn.slice(start,end):[];

    h+=`<div class="juz-section-hdr"><div class="juz-section-badge">${n}</div><div class="juz-section-info"><div class="juz-section-name">${sm.name}</div><div class="juz-section-sub">${sm.tr} · Ayahs ${start+1}–${end}</div></div><div class="juz-section-ar">${sm.ar}</div></div>`;
    if(n!==1&&n!==9&&start===0) h+=`<div class="bism-divider">بِسْمِ ٱللَّهِ ٱلرَّحْمَٰنِ ٱلرَّحِيمِ</div>`;
    h+=`<div class="alist">`;
    sliceAr.forEach((arTxt,i)=>{ const globalIdx=start+i,an=globalIdx+1,bk=isBk(n,an); h+=ayahCard(n,an,globalIdx,arTxt,sliceTr[i]||'',sliceBn[i]||'',bk,'j'); });
    h+=`</div>`;
  });
  C.innerHTML=h; resetScroll();
}
function cycleLangJuz(){S.lang=S.lang==='english'?'bengali':'english';renderJuzReader()}

// ══════════════════════════════════════════════════════════════
// AUDIO
// ══════════════════════════════════════════════════════════════
function stopAudio(){
  if(S.aud){S.aud.pause();S.aud=null} S.playingAyah=null;S.playingMode=null;
  $('audio-player').classList.remove('on');
  document.querySelectorAll('.play-ayah').forEach(b=>{ b.innerHTML=`<svg viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>`; b.classList.remove('playing'); });
  document.querySelectorAll('.ac').forEach(c=>c.classList.remove('playing'));
  const p=$('psbtn');if(p)p.innerHTML=`<svg viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg> Play Full Surah`;
}
function showAudioBar(title,sub){ $('ap-title').textContent=title;$('ap-sub').textContent=sub; $('audio-player').classList.add('on'); }
function setAudioProgress(pct){ const f=$('ap-fill');if(f)f.style.width=Math.min(100,pct)+'%'; }

function toggleSurahAudio(){ if(S.playingMode==='surah'){stopAudio();return} stopAudio(); const sm=SURAHS[S.surahNo-1]; playSeq(0,sm.ay,sm.name); }
function playSeq(idx,total,name){
  if(idx>=total){stopAudio();return}
  const a=new Audio(mp3(S.reciter,S.surahNo,idx+1)); S.aud=a;S.playingMode='surah';S.playingAyah=idx;
  document.querySelectorAll('.ac').forEach(c=>c.classList.remove('playing'));
  const ac=$('ac-'+idx); if(ac){ ac.classList.add('playing'); ac.scrollIntoView({behavior:'smooth',block:'center'}); }
  const pb=$('pb-'+idx);if(pb){ pb.innerHTML=`<svg viewBox="0 0 24 24"><rect x="6" y="6" width="12" height="12"></rect></svg>`; pb.classList.add('playing'); }
  const p=$('psbtn');if(p)p.innerHTML=`<svg viewBox="0 0 24 24"><rect x="6" y="6" width="12" height="12"></rect></svg> Stop`;
  showAudioBar(`${name} — Ayah ${idx+1} / ${total}`,RECITERS[S.reciter].name);
  setAudioProgress((idx/total)*100);
  a.play().catch(()=>{}); a.onended=()=>{if(S.playingMode==='surah')playSeq(idx+1,total,name)};
}

function toggleAyahAudio(idx){
  if(S.playingAyah===idx&&S.playingMode==='ayah'){stopAudio();return} stopAudio();
  const sm=SURAHS[S.surahNo-1]; const pb=$('pb-'+idx),ac=$('ac-'+idx);
  if(pb){ pb.innerHTML=`<svg viewBox="0 0 24 24"><rect x="6" y="6" width="12" height="12"></rect></svg>`; pb.classList.add('playing'); }
  if(ac){ ac.classList.add('playing'); ac.scrollIntoView({behavior:'smooth',block:'center'}); }
  const a=new Audio(mp3(S.reciter,S.surahNo,idx+1)); S.aud=a;S.playingAyah=idx;S.playingMode='ayah';
  showAudioBar(`${sm.name} — Ayah ${idx+1}`,RECITERS[S.reciter].name);
  setAudioProgress(0); a.play().catch(()=>stopAudio());
  a.ontimeupdate=()=>setAudioProgress(a.currentTime/a.duration*100); a.onended=stopAudio;
}

function toggleJuzAyahAudio(surahNo,ayahIdx){
  const key=`j-${surahNo}-${ayahIdx}`; if(S.playingAyah===key&&S.playingMode==='ayah'){stopAudio();return} stopAudio();
  const sm=SURAHS[surahNo-1]; const pb=$(`jpb-${surahNo}-${ayahIdx}`),ac=$(`jac-${surahNo}-${ayahIdx}`);
  if(pb){ pb.innerHTML=`<svg viewBox="0 0 24 24"><rect x="6" y="6" width="12" height="12"></rect></svg>`; pb.classList.add('playing'); }
  if(ac){ ac.classList.add('playing'); ac.scrollIntoView({behavior:'smooth',block:'center'}); }
  const a=new Audio(mp3(S.reciter,surahNo,ayahIdx+1)); S.aud=a;S.playingAyah=key;S.playingMode='ayah';
  showAudioBar(`${sm.name} — Ayah ${ayahIdx+1}`,RECITERS[S.reciter].name);
  setAudioProgress(0); a.play().catch(()=>stopAudio());
  a.ontimeupdate=()=>setAudioProgress(a.currentTime/a.duration*100); a.onended=stopAudio;
}

renderHome();
